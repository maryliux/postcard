<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Postcard Landing</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="scene">
      <header class="scene__meta" aria-hidden="true">
        <span>VENICE</span>
        <span>ITALY</span>
        <span>DAY 1 FIT</span>
      </header>

      <section class="postcard-wrap">
        <div class="clip" aria-hidden="true"></div>
        <button
          class="postcard"
          id="postcard"
          type="button"
          aria-label="Interactive postcard. Drag or click to flip front and back."
        >
          <div class="postcard__inner" id="postcardInner">
            <figure class="postcard__face postcard__face--front">
              <img src="frontpost.png" alt="Postcard front" draggable="false" />
            </figure>
            <figure class="postcard__face postcard__face--back">
              <img src="backpost.png" alt="Postcard back" draggable="false" />
            </figure>
          </div>
        </button>
      </section>

      <p class="scene__hint">Drag or click the postcard to flip</p>
      <p class="scene__signature">LITERALLYSOSTUPID</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
