<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Postcard Landing</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="scene">
      <section class="postcard-wrap">
        <button
          class="postcard"
          id="postcard"
          type="button"
          aria-label="Interactive postcard. Drag in any direction or click to flip."
        >
          <div class="postcard__inner" id="postcardInner">
            <figure class="postcard__face postcard__face--front">
              <img src="frontpost.png" alt="Postcard front" draggable="false" />
            </figure>
            <figure class="postcard__face postcard__face--back">
              <img src="backpost.png" alt="Postcard back" draggable="false" />
            </figure>
          </div>
        </button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
