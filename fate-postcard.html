<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Postcard of Fate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Beth+Ellen&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="fate-postcard.css" />
  </head>
  <body>
    <main class="creator">
      <div class="creator__top-bar">
        <a class="creator__back-button" href="index.html" aria-label="Back to landing page">← back</a>
        <div class="creator__view-toggle" role="group" aria-label="Card display mode">
          <button class="creator__mode-button is-active" id="mode3dButton" type="button">3d card</button>
          <button class="creator__mode-button" id="mode2dButton" type="button">2d card</button>
        </div>
      </div>

      <section class="creator__view creator__view--3d" id="creatorView3d">
        <div class="creator__postcard-wrap">
          <button
            class="creator__postcard"
            id="creatorPostcard"
            type="button"
            aria-label="Interactive postcard. Drag in any direction or click to flip."
          >
            <div class="creator__postcard-inner" id="creatorPostcardInner">
              <figure class="creator__face creator__face--front">
                <img id="creatorFrontImage3d" src="frontcard.png" alt="Your uploaded postcard front" />
              </figure>
              <figure class="creator__face creator__face--back">
                <img src="backcard.png" alt="Postcard back" />
              </figure>
            </div>
          </button>
        </div>
      </section>

      <section class="creator__view creator__view--2d" id="creatorView2d" hidden>
        <figure class="creator__flat-card">
          <img id="creatorFrontImage2d" src="frontcard.png" alt="Your uploaded postcard front" />
        </figure>
        <figure class="creator__flat-card">
          <img src="backcard.png" alt="Postcard back" />
        </figure>
      </section>

      <section class="creator__fortunes" aria-live="polite">
        <p class="creator__fortune-line" id="fortuneLine1"></p>
        <p class="creator__fortune-line" id="fortuneLine2"></p>
        <p class="creator__fortune-line" id="fortuneLine3"></p>
      </section>
    </main>

    <script src="fate-postcard.js"></script>
  </body>
</html>
